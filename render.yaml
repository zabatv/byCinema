services:
  - type: web
    name: bycinema-merch
    env: docker
    repo: https://github.com/yourusername/bycinema-merch
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bycinema-merch-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLOUD_STORAGE_PROVIDER
        value: local
      - key: CLOUD_STORAGE_BUCKET
        value: uploads
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://bycinema-merch.onrender.com

databases:
  - name: bycinema-merch-db
    databaseName: bycinema
    user: bycinema_user
